<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#bc8cff;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:0.3" />
      <stop offset="50%" style="stop-color:#bc8cff;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:0.3" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)" />

  <!-- Border -->
  <rect x="1" y="1" width="798" height="198" rx="11" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5" />

  <!-- Decorative grid dots -->
  <g opacity="0.1" fill="#58a6ff">
    <circle cx="50" cy="40" r="1.5" />
    <circle cx="80" cy="40" r="1.5" />
    <circle cx="110" cy="40" r="1.5" />
    <circle cx="50" cy="60" r="1.5" />
    <circle cx="80" cy="60" r="1.5" />
    <circle cx="110" cy="60" r="1.5" />
    <circle cx="50" cy="80" r="1.5" />
    <circle cx="80" cy="80" r="1.5" />
    <circle cx="110" cy="80" r="1.5" />
    <circle cx="690" cy="120" r="1.5" />
    <circle cx="720" cy="120" r="1.5" />
    <circle cx="750" cy="120" r="1.5" />
    <circle cx="690" cy="140" r="1.5" />
    <circle cx="720" cy="140" r="1.5" />
    <circle cx="750" cy="140" r="1.5" />
    <circle cx="690" cy="160" r="1.5" />
    <circle cx="720" cy="160" r="1.5" />
    <circle cx="750" cy="160" r="1.5" />
  </g>

  <!-- Automation icon (gear + lightning) -->
  <g transform="translate(100, 70)">
    <!-- Gear -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.6" />
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.4" />
    <!-- Gear teeth -->
    <g stroke="url(#accent)" stroke-width="2" opacity="0.6">
      <line x1="0" y1="-28" x2="0" y2="-35" />
      <line x1="24" y1="-14" x2="30" y2="-17.5" />
      <line x1="24" y1="14" x2="30" y2="17.5" />
      <line x1="0" y1="28" x2="0" y2="35" />
      <line x1="-24" y1="14" x2="-30" y2="17.5" />
      <line x1="-24" y1="-14" x2="-30" y2="-17.5" />
    </g>
    <!-- Lightning bolt -->
    <path d="M-5,-12 L3,-2 L-2,-2 L5,12 L-3,2 L2,2 Z" fill="url(#accent)" />
  </g>

  <!-- AI nodes network -->
  <g transform="translate(680, 80)" opacity="0.5">
    <circle cx="0" cy="0" r="6" fill="#58a6ff" opacity="0.6" />
    <circle cx="30" cy="-25" r="4" fill="#bc8cff" opacity="0.6" />
    <circle cx="40" cy="15" r="5" fill="#58a6ff" opacity="0.6" />
    <circle cx="-20" cy="30" r="4" fill="#bc8cff" opacity="0.6" />
    <circle cx="60" cy="-10" r="3" fill="#58a6ff" opacity="0.6" />
    <line x1="0" y1="0" x2="30" y2="-25" stroke="#58a6ff" stroke-width="0.8" opacity="0.4" />
    <line x1="0" y1="0" x2="40" y2="15" stroke="#bc8cff" stroke-width="0.8" opacity="0.4" />
    <line x1="0" y1="0" x2="-20" y2="30" stroke="#58a6ff" stroke-width="0.8" opacity="0.4" />
    <line x1="30" y1="-25" x2="60" y2="-10" stroke="#bc8cff" stroke-width="0.8" opacity="0.4" />
    <line x1="40" y1="15" x2="60" y2="-10" stroke="#58a6ff" stroke-width="0.8" opacity="0.4" />
  </g>

  <!-- Title -->
  <text x="400" y="78" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="36" font-weight="700" fill="url(#accent)">
    Curated AI Automation
  </text>

  <!-- Subtitle -->
  <text x="400" y="110" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#8b949e">
    AI-powered automation tools, no-code platforms, and workflow builders
  </text>

  <!-- Accent line -->
  <rect x="300" y="125" width="200" height="2" rx="1" fill="url(#accent)" opacity="0.5" />

  <!-- Stats -->
  <text x="310" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#58a6ff">
    90+ Tools
  </text>
  <text x="400" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#bc8cff">
    9 Categories
  </text>
  <text x="490" y="155" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#58a6ff">
    Open Source
  </text>
</svg>
