name: New Tool Suggestion
description: Suggest a new AI automation tool to add to the list
title: "[New Tool] "
labels: ["new-tool"]
body:
  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: Official name of the tool
      placeholder: e.g., My AI Tool
    validations:
      required: true
  - type: input
    id: tool-url
    attributes:
      label: Tool URL
      description: Website or GitHub repository URL
      placeholder: https://example.com
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Which category does this tool belong to?
      options:
        - Workflow Platforms
        - AI-Native Automation
        - Chatbot Builders
        - RPA (Robotic Process Automation)
        - Email & Marketing Automation
        - Data Automation
        - Document Processing
        - Browser Automation
        - Voice & Phone Automation
        - Other (specify below)
    validations:
      required: true
  - type: dropdown
    id: type
    attributes:
      label: Type
      description: Is this tool open source or commercial?
      options:
        - Open Source
        - Commercial
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Brief description of the tool (one sentence, max 120 characters)
      placeholder: AI-powered tool that does X for Y.
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why should this be included?
      description: Explain why this tool deserves to be on the list
    validations:
      required: false
