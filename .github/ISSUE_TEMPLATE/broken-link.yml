name: Broken Link Report
description: Report a broken or dead link in the list
title: "[Broken Link] "
labels: ["broken-link"]
body:
  - type: input
    id: tool-name
    attributes:
      label: Tool Name
      description: Name of the tool with the broken link
      placeholder: e.g., Zapier
    validations:
      required: true
  - type: input
    id: broken-url
    attributes:
      label: Broken URL
      description: The URL that is not working
      placeholder: https://example.com
    validations:
      required: true
  - type: input
    id: correct-url
    attributes:
      label: Correct URL (if known)
      description: The updated or correct URL, if you know it
      placeholder: https://new-example.com
    validations:
      required: false
  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other information about the broken link
    validations:
      required: false
